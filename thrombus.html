<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBC Thrombus Collision</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0608;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  .label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,180,180,0.5);
    font-family: 'Instrument Serif', serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }

  .restart-btn {
    position: fixed;
    top: 20px;
    right: 24px;
    background: rgba(180,30,30,0.25);
    border: 1px solid rgba(255,100,100,0.3);
    color: rgba(255,200,200,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
  }
  .restart-btn:hover {
    background: rgba(180,30,30,0.5);
    color: rgba(255,220,220,0.95);
  }
</style>
</head>
<body>
<a href="/" aria-label="Back to arcade" style="position:fixed;top:14px;left:14px;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:.03em;text-decoration:none;color:#eafcff;background:rgba(18,8,38,.72);border:1px solid rgba(0,234,255,.45);border-radius:999px;padding:8px 14px 8px 12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 0 14px rgba(0,234,255,.28)">◄ Arcade</a>
<canvas id="c"></canvas>
<div class="label">Mechanical Hemolysis — Schistocyte Formation</div>
<button class="restart-btn" onclick="restart()">↻ Replay</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let animFrame;
let startTime;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(1, 1);
}
window.addEventListener('resize', () => { resize(); });
resize();

// --- Config ---
const FLOW_SPEED = 1.8;
const COLLISION_TIME = 4200; // ms into animation when collision happens
const TOTAL_TIME = 9000;

// --- Helpers ---
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }
function easeOutBack(t) { const c1=1.70158; const c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

// --- Background particles (plasma) ---
class PlasmaParticle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 2 + 0.5;
    this.alpha = Math.random() * 0.15 + 0.03;
    this.speed = Math.random() * 0.5 + 0.3;
    this.color = Math.random() > 0.5 ? '255,220,180' : '255,200,200';
  }
  update() {
    this.x -= this.speed * FLOW_SPEED;
    if (this.x < -10) { this.x = W + 10; this.y = Math.random() * H; }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
    ctx.fill();
  }
}

// --- Background RBCs (not the main one) ---
class BackgroundRBC {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = initial ? Math.random() * W : W + Math.random() * 200 + 50;
    this.y = Math.random() * H;
    this.size = Math.random() * 18 + 12;
    this.speed = Math.random() * 0.8 + 0.6;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.01 + 0.005;
    this.wobbleAmp = Math.random() * 8 + 4;
    this.rotation = Math.random() * Math.PI;
    this.rotSpeed = (Math.random() - 0.5) * 0.005;
    this.alpha = Math.random() * 0.25 + 0.08;
    this.depth = Math.random(); // 0=far, 1=close
  }
  update(t) {
    this.x -= this.speed * FLOW_SPEED * (0.5 + this.depth * 0.5);
    this.wobble += this.wobbleSpeed;
    this.y += Math.sin(this.wobble) * 0.5;
    this.rotation += this.rotSpeed;
    if (this.x < -60) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.alpha;
    drawRBCShape(ctx, 0, 0, this.size, `rgba(180,25,25,1)`, `rgba(120,15,15,1)`);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawRBCShape(ctx, x, y, size, colorOuter, colorInner) {
  // Biconcave disc - side/angled view as an ellipse with central dimple
  const w = size;
  const h = size * 0.42;
  ctx.beginPath();
  ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(x, y, 0, x, y, w);
  grad.addColorStop(0, colorInner);
  grad.addColorStop(0.4, colorOuter);
  grad.addColorStop(0.75, colorOuter);
  grad.addColorStop(1, 'rgba(80,5,5,0.6)');
  ctx.fillStyle = grad;
  ctx.fill();
  // Central dimple
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.35, h * 0.35, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(90,10,10,0.5)';
  ctx.fill();
}

// --- Thrombus ---
class Thrombus {
  constructor() {
    this.cx = W * 0.58;
    this.cy = H * 0.5;
    this.nodes = [];
    this.buildMesh();
  }
  buildMesh() {
    // Irregular mass of platelets/fibrin
    const count = 28;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const dist = 35 + Math.random() * 55;
      this.nodes.push({
        ox: Math.cos(angle) * dist,
        oy: Math.sin(angle) * dist,
        r: Math.random() * 14 + 8,
        phase: Math.random() * Math.PI * 2,
        type: Math.random() > 0.4 ? 'platelet' : 'fibrin'
      });
    }
    // Inner mass
    for (let i = 0; i < 14; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 35;
      this.nodes.push({
        ox: Math.cos(angle) * dist,
        oy: Math.sin(angle) * dist,
        r: Math.random() * 12 + 6,
        phase: Math.random() * Math.PI * 2,
        type: 'platelet'
      });
    }
  }
  draw(t) {
    const s = Math.min(1, t / 2000); // grow in
    const scale = easeOutBack(clamp(s, 0, 1));
    ctx.save();
    ctx.translate(this.cx, this.cy);
    ctx.scale(scale, scale);

    // Fibrin strands
    ctx.strokeStyle = 'rgba(255,240,200,0.12)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < this.nodes.length; i++) {
      for (let j = i + 1; j < this.nodes.length; j++) {
        const a = this.nodes[i], b = this.nodes[j];
        const dx = a.ox - b.ox, dy = a.oy - b.oy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 55) {
          ctx.beginPath();
          ctx.moveTo(a.ox, a.oy);
          ctx.lineTo(b.ox, b.oy);
          ctx.stroke();
        }
      }
    }

    // Nodes
    for (const n of this.nodes) {
      const pulse = Math.sin(t * 0.002 + n.phase) * 2;
      const nx = n.ox + pulse * 0.3;
      const ny = n.oy + pulse * 0.3;

      if (n.type === 'platelet') {
        const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, n.r);
        grad.addColorStop(0, 'rgba(220,200,255,0.5)');
        grad.addColorStop(0.5, 'rgba(180,160,220,0.35)');
        grad.addColorStop(1, 'rgba(120,100,160,0.1)');
        ctx.beginPath();
        // Irregular platelet shape
        for (let a = 0; a < Math.PI * 2; a += 0.3) {
          const rr = n.r * (0.8 + 0.2 * Math.sin(a * 3 + n.phase));
          const px = nx + Math.cos(a) * rr;
          const py = ny + Math.sin(a) * rr;
          a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
      } else {
        // Fibrin node
        ctx.beginPath();
        ctx.arc(nx, ny, n.r * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,230,180,0.2)';
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

// --- Main RBC (the one that collides) ---
class MainRBC {
  constructor() { this.reset(); }
  reset() {
    this.startX = W + 80;
    this.startY = H * 0.48;
    this.x = this.startX;
    this.y = this.startY;
    this.size = 28;
    this.rotation = 0.15;
    this.wobble = 0;
    this.phase = 0; // 0=flowing, 1=colliding, 2=fragmenting
    this.fragments = [];
    this.deformT = 0;
    this.alpha = 1;
  }
  update(t) {
    if (t < COLLISION_TIME) {
      // Phase 0: Flowing toward thrombus
      const progress = t / COLLISION_TIME;
      const targetX = W * 0.58 - 85; // just touching thrombus
      this.x = lerp(this.startX, targetX, easeInOut(clamp(progress, 0, 1)));
      this.wobble = Math.sin(t * 0.003) * 6;
      this.y = this.startY + this.wobble;
      this.rotation = Math.sin(t * 0.002) * 0.15;
      this.phase = 0;
    } else if (t < COLLISION_TIME + 600) {
      // Phase 1: Deformation / collision
      const dt = (t - COLLISION_TIME) / 600;
      this.deformT = dt;
      this.phase = 1;
      // Squeeze against thrombus
      this.x = W * 0.58 - 85 + dt * 8;
      this.y = this.startY + Math.sin(t * 0.003) * 3;
      this.rotation = dt * 0.3;
    } else {
      // Phase 2: Fragmentation
      this.phase = 2;
      if (this.fragments.length === 0) this.createFragments();
      const ft = (t - COLLISION_TIME - 600) / 3000;
      for (const f of this.fragments) {
        f.x += f.vx;
        f.y += f.vy;
        f.vx *= 0.995;
        f.vy *= 0.995;
        f.vx -= 0.12 * FLOW_SPEED; // carried by flow
        f.rotation += f.rotSpeed;
        f.alpha = Math.max(0, 1 - ft * 1.2);
      }
    }
  }
  createFragments() {
    const cx = this.x;
    const cy = this.y;
    const count = 7;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
      const speed = Math.random() * 2 + 1;
      this.fragments.push({
        x: cx + Math.cos(angle) * 5,
        y: cy + Math.sin(angle) * 5,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 12 + 6,
        aspectRatio: Math.random() * 0.3 + 0.2,
        rotation: Math.random() * Math.PI,
        rotSpeed: (Math.random() - 0.5) * 0.04,
        alpha: 1,
        type: i < 2 ? 'helmet' : (i < 4 ? 'triangle' : 'crescent')
      });
    }
  }
  draw(t) {
    if (this.phase < 2) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);

      if (this.phase === 1) {
        // Deformed RBC
        const squeeze = 1 - this.deformT * 0.35;
        const stretch = 1 + this.deformT * 0.5;
        ctx.scale(squeeze, stretch);
        // Stress coloring
        const stress = this.deformT;
        const r = Math.round(lerp(190, 220, stress));
        const g = Math.round(lerp(25, 15, stress));
        const b = Math.round(lerp(25, 15, stress));
        drawRBCShape(ctx, 0, 0, this.size, `rgba(${r},${g},${b},1)`, `rgba(${r-50},5,5,1)`);

        // Stress lines
        ctx.strokeStyle = `rgba(255,100,100,${stress * 0.5})`;
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI + stress;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * 5, Math.sin(a) * 3);
          ctx.lineTo(Math.cos(a) * this.size * 0.8, Math.sin(a) * this.size * 0.3);
          ctx.stroke();
        }
      } else {
        drawRBCShape(ctx, 0, 0, this.size, 'rgba(190,25,25,1)', 'rgba(130,15,15,1)');
      }

      // Glow
      const grad = ctx.createRadialGradient(0, 0, this.size * 0.5, 0, 0, this.size * 2);
      grad.addColorStop(0, 'rgba(200,30,30,0.15)');
      grad.addColorStop(1, 'rgba(200,30,30,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, this.size * 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    } else {
      // Draw fragments (schistocytes)
      for (const f of this.fragments) {
        if (f.alpha <= 0) continue;
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        ctx.globalAlpha = f.alpha;

        if (f.type === 'helmet') {
          // Helmet cell shape
          ctx.beginPath();
          ctx.arc(0, 0, f.size, 0, Math.PI, false);
          ctx.closePath();
          const g = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size);
          g.addColorStop(0, 'rgba(160,15,15,1)');
          g.addColorStop(1, 'rgba(110,10,10,0.8)');
          ctx.fillStyle = g;
          ctx.fill();
        } else if (f.type === 'triangle') {
          // Triangular fragment
          ctx.beginPath();
          ctx.moveTo(0, -f.size);
          ctx.lineTo(f.size * 0.7, f.size * 0.5);
          ctx.lineTo(-f.size * 0.6, f.size * 0.4);
          ctx.closePath();
          const g = ctx.createLinearGradient(0, -f.size, 0, f.size);
          g.addColorStop(0, 'rgba(180,20,20,1)');
          g.addColorStop(1, 'rgba(120,10,10,0.8)');
          ctx.fillStyle = g;
          ctx.fill();
        } else {
          // Crescent fragment
          ctx.beginPath();
          ctx.arc(0, 0, f.size, 0.3, Math.PI - 0.3, false);
          ctx.arc(0, f.size * 0.3, f.size * 0.7, Math.PI - 0.3, 0.3, true);
          ctx.closePath();
          const g = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size);
          g.addColorStop(0, 'rgba(170,18,18,1)');
          g.addColorStop(1, 'rgba(100,8,8,0.7)');
          ctx.fillStyle = g;
          ctx.fill();
        }

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Impact burst (flash)
      const ft = (t - COLLISION_TIME - 600);
      if (ft < 400) {
        const burstAlpha = (1 - ft / 400) * 0.6;
        const burstR = ft * 0.4;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, burstR + 30);
        grad.addColorStop(0, `rgba(255,120,80,${burstAlpha})`);
        grad.addColorStop(0.5, `rgba(200,30,30,${burstAlpha * 0.3})`);
        grad.addColorStop(1, `rgba(200,30,30,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, burstR + 30, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

// --- Scene Label ---
function drawPhaseLabel(t) {
  let text = '';
  let alpha = 0;
  if (t < 1500) {
    text = 'Red blood cell flowing through vessel';
    alpha = clamp(t / 500, 0, 1);
  } else if (t < COLLISION_TIME - 500) {
    text = 'Approaching forming thrombus';
    const lt = t - 1500;
    alpha = clamp(lt / 400, 0, 1);
  } else if (t >= COLLISION_TIME && t < COLLISION_TIME + 600) {
    text = 'Impact — membrane under shear stress';
    alpha = 1;
  } else if (t >= COLLISION_TIME + 600 && t < COLLISION_TIME + 3500) {
    text = 'Fragmentation → Schistocytes (helmet cells)';
    const lt = t - COLLISION_TIME - 600;
    alpha = clamp(lt / 300, 0, 1);
  }

  if (alpha > 0 && text) {
    ctx.save();
    ctx.globalAlpha = alpha * 0.75;
    ctx.font = `${14 * devicePixelRatio}px 'DM Sans', sans-serif`;
    ctx.fillStyle = 'rgba(255,200,200,0.9)';
    ctx.textAlign = 'center';
    ctx.fillText(text, W / 2, 40 * devicePixelRatio);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// --- Vessel walls ---
function drawVesselWalls(t) {
  const wallH = H * 0.12;
  // Top wall
  let g = ctx.createLinearGradient(0, 0, 0, wallH);
  g.addColorStop(0, 'rgba(60,20,25,0.9)');
  g.addColorStop(0.7, 'rgba(80,25,30,0.4)');
  g.addColorStop(1, 'rgba(80,25,30,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, wallH);

  // Bottom wall
  g = ctx.createLinearGradient(0, H, 0, H - wallH);
  g.addColorStop(0, 'rgba(60,20,25,0.9)');
  g.addColorStop(0.7, 'rgba(80,25,30,0.4)');
  g.addColorStop(1, 'rgba(80,25,30,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, H - wallH, W, wallH);

  // Endothelial cells texture
  ctx.strokeStyle = 'rgba(100,40,45,0.15)';
  ctx.lineWidth = 1;
  const spacing = 40;
  const offset = (t * 0.02 * FLOW_SPEED) % spacing;
  for (let x = -spacing + offset; x < W + spacing; x += spacing) {
    // Top
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.quadraticCurveTo(x + spacing/2, wallH * 0.4, x + spacing, 0);
    ctx.stroke();
    // Bottom
    ctx.beginPath();
    ctx.moveTo(x, H);
    ctx.quadraticCurveTo(x + spacing/2, H - wallH * 0.4, x + spacing, H);
    ctx.stroke();
  }
}

// --- Init ---
let plasmaParticles = [];
let bgRBCs = [];
let thrombus;
let mainRBC;

function init() {
  plasmaParticles = [];
  bgRBCs = [];
  for (let i = 0; i < 200; i++) plasmaParticles.push(new PlasmaParticle());
  for (let i = 0; i < 18; i++) bgRBCs.push(new BackgroundRBC());
  thrombus = new Thrombus();
  mainRBC = new MainRBC();
  startTime = performance.now();
}

function drawBackground(t) {
  // Deep red/maroon gradient for blood
  const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.7);
  g.addColorStop(0, '#1a0a0c');
  g.addColorStop(0.5, '#120608');
  g.addColorStop(1, '#0a0405');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Flowing highlight
  const hx = (W * 0.5 + Math.sin(t * 0.0005) * W * 0.2);
  const hg = ctx.createRadialGradient(hx, H/2, 0, hx, H/2, H * 0.6);
  hg.addColorStop(0, 'rgba(100,15,20,0.15)');
  hg.addColorStop(1, 'rgba(100,15,20,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, 0, W, H);
}

function loop() {
  const t = performance.now() - startTime;

  drawBackground(t);
  drawVesselWalls(t);

  for (const p of plasmaParticles) { p.update(); p.draw(); }

  // Sort bg RBCs by depth
  bgRBCs.sort((a, b) => a.depth - b.depth);
  for (const rbc of bgRBCs) { rbc.update(t); }
  // Draw bg RBCs behind thrombus
  for (const rbc of bgRBCs.filter(r => r.depth < 0.5)) rbc.draw();

  thrombus.draw(t);

  // Draw bg RBCs in front
  for (const rbc of bgRBCs.filter(r => r.depth >= 0.5)) rbc.draw();

  mainRBC.update(t);
  mainRBC.draw(t);

  drawPhaseLabel(t);

  if (t < TOTAL_TIME) {
    animFrame = requestAnimationFrame(loop);
  }
}

function restart() {
  if (animFrame) cancelAnimationFrame(animFrame);
  resize();
  init();
  loop();
}

restart();
</script>
</body>
</html>
